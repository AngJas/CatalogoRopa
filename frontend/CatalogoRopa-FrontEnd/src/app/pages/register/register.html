<div class="auth-form">
  <h2>Registrarse</h2>
  <form (ngSubmit)="submit()" [formGroup]="form">
    <label>
      Nombre
      <input formControlName="nombre" [class.invalid]="isInvalid('nombre')">
      <div *ngIf="isInvalid('nombre')" class="error-msg">{{ getErrorMessage('nombre') }}</div>
    </label>

    <label>
      Apellido
      <input formControlName="apellido">
    </label>

    <label>
      Email
      <input formControlName="email" type="email" [class.invalid]="isInvalid('email')">
      <div *ngIf="isInvalid('email')" class="error-msg">{{ getErrorMessage('email') }}</div>
    </label>

    <label>
      Contraseña
      <input formControlName="contrasena" type="password" [class.invalid]="isInvalid('contrasena')">
      <div *ngIf="isInvalid('contrasena')" class="error-msg">{{ getErrorMessage('contrasena') }}</div>
    </label>

    <label>
      Teléfono
      <input formControlName="telefono" [class.invalid]="isInvalid('telefono')">
      <div *ngIf="isInvalid('telefono')" class="error-msg">{{ getErrorMessage('telefono') }}</div>
    </label>

    <div *ngIf="error" class="error">{{ error }}</div>

    <button type="submit" class="btn btn-ghost" [disabled]="form.invalid" aria-label="Registrarse">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5z" fill="currentColor"/></svg>
      <span class="label">Registrarse</span>
    </button>
  </form>
</div>
