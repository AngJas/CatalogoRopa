<header class="encabezado-sitio">
  <nav class="encabezado" aria-label="Navegacion principal">
    <div class="barra-encabezado">

      <a class="logo" routerLink="/">TUROPA.COM</a>

      <div class="fila-menu-busqueda">
        <ul class="menu">
          <li><a routerLink="/novedades" routerLinkActive="activo">Novedades</a></li>
          <li><a routerLink="/promociones" routerLinkActive="activo">Promociones</a></li>
          <li><a routerLink="/hombre" routerLinkActive="activo">Hombre</a></li>
          <li><a routerLink="/mujer" routerLinkActive="activo">Mujer</a></li>
          <li><a routerLink="/todo" routerLinkActive="activo">Todo</a></li>
        </ul>

        <form class="contenedor-busqueda" role="search">
          <input type="search" placeholder="Buscar prenda" aria-label="Buscar prenda">
          <button type="submit" aria-label="Buscar">🔍</button>
        </form>

        <a class="boton-agregar-producto" routerLink="/producto/nuevo" title="Agregar producto" aria-label="Agregar producto">
        📦
        </a>
        <div class="auth-actions" role="region" aria-label="Autenticación">
          <ng-container *ngIf="!auth.isLoggedIn(); else logged">
            <a class="btn btn-ghost" routerLink="/login" aria-label="Iniciar sesión">
              <!-- login icon -->
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M10 17l5-5-5-5v10z" fill="currentColor"/></svg>
              <span class="label">Iniciar sesión</span>
            </a>

            <a class="btn btn-primary" routerLink="/register" aria-label="Registrarse">
              <!-- register / user-plus icon -->
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v2h20v-2c0-3.3-6.7-5-10-5z" fill="currentColor"/></svg>
              <span class="label">Registrarse</span>
            </a>
          </ng-container>

          <ng-template #logged>
            <div class="user-area">
              <button class="user-btn" aria-label="Perfil del usuario">
                <span class="avatar" aria-hidden="true">👤</span>
                <span class="username">Hola, {{ nombreUsuario }}</span>
              </button>
              <button class="btn btn-logout" (click)="logout()" aria-label="Cerrar sesión">
                <!-- logout icon -->
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M16 17l5-5-5-5v3H9v4h7v3zM4 19h8v2H4c-1.1 0-2-.9-2-2V5c0-1.1.9-2 2-2h8v2H4v14z" fill="currentColor"/></svg>
                <span class="label">Cerrar sesión</span>
              </button>
            </div>
          </ng-template>
        </div>
      </div>

    </div>
  </nav>
</header>
