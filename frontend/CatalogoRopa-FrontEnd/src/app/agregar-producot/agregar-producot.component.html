<section class="pantalla-producto">
  <div class="encabezado-formulario">
    <h2>{{ editingId ? 'Editar producto' : 'Agregar producto' }}</h2>
    <a routerLink="/catalogo">Volver al catalogo</a>
  </div>


  <form class="formulario-producto" [formGroup]="formulario" (ngSubmit)="guardarProducto()">
    <label>
      IdProducto
      <input type="number"
        [value]="buscarId"
        (input)="buscarId = ($any($event.target).value || '').replace(/[^0-9]/g, '')"
        (blur)="buscarProducto()"
        (keydown.enter)="$event.preventDefault(); buscarProducto()">
    </label>
    <label>
      Nombre
      <input type="text" formControlName="nombre">
    </label>

    <label>
      Descripcion
      <textarea rows="4" formControlName="descripcion"></textarea>
    </label>

    <label>
      Precio base
      <input type="number" formControlName="precioBase">
    </label>

    <label>
      Genero
      <select formControlName="genero">
        <option value="">Seleccionar</option>
        <option value="Hombre">Hombre</option>
        <option value="Mujer">Mujer</option>
        <option value="Unisex">Unisex</option>
      </select>
    </label>

    <label>
      Material
      <input type="text" formControlName="material">
    </label>

    <label>
      ID Marca
      <input type="number" formControlName="idMarca">
    </label>

    <label>
      ID Categoria
      <input type="number" formControlName="idCategoria">
    </label>

    <label>
      ID Coleccion
      <input type="number" formControlName="idColeccion">
    </label>

    <label>
      ID Promocion
      <input type="number" formControlName="idPromocion">
    </label>

    <label class="campo-imagen">
      Imagen del producto
      <input type="file" accept="image/*" (change)="seleccionarImagen($event)">
    </label>

    <div class="vista-previa" *ngIf="vistaPrevia">
      <img [src]="vistaPrevia" alt="Vista previa del producto">
    </div>

    <p class="error" *ngIf="error">{{ error }}</p>

    <button type="submit" [disabled]="guardando">
      {{ guardando ? (editingId ? 'Actualizando...' : 'Guardando...') : (editingId ? 'Actualizar producto' : 'Guardar producto') }}
    </button>
  </form>
</section>
